name: app_movil
description: "Vibra Pay - App de pagos"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  http: ^1.1.0
  provider: ^6.0.5
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.1.6
  flutter_nfc_kit: ^3.6.2  # opcional
  qr_flutter: ^4.1.0          # Para generar QR
