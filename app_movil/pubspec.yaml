  image_picker: ^1.0.0        # (opcional) para subir fotos
  share_plus: ^7.0.0          # (opcional) para compartir PDF
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true